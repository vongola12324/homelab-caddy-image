name: Build & Release Caddy Image

on:
  pull_request:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "build.sh"
      - "modules.txt"
      - ".github/workflows/build.yml"
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "build.sh"
      - "modules.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('caddy-image-pr-{0}', github.event.pull_request.number) || 'caddy-image-build' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write   # create GitHub Releases
  packages: write    # push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IS_PUBLISH: ${{ github.event_name != 'pull_request' }}

jobs:
  build:
    name: Build, validate & release
    runs-on: ubuntu-latest
    outputs:
      full_tag: ${{ steps.revision.outputs.full_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Parse ARG CADDY_VERSION from Dockerfile
        id: version
        shell: bash
        run: |
          set -euo pipefail

          line="$(grep -m1 '^ARG CADDY_VERSION=' Dockerfile || true)"
          if [ -z "$line" ]; then
            echo "::error::Could not find a line matching '^ARG CADDY_VERSION=' in Dockerfile"
            exit 1
          fi

          caddy_version="${line#ARG CADDY_VERSION=}"
          # Defensive trim in case of stray whitespace/CR
          caddy_version="$(echo "$caddy_version" | tr -d '[:space:]')"

          if ! [[ "$caddy_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Parsed CADDY_VERSION '$caddy_version' is not a plain semver (X.Y.Z)"
            exit 1
          fi

          major="$(echo "$caddy_version" | cut -d. -f1)"
          minor="$(echo "$caddy_version" | cut -d. -f1,2)"

          echo "Parsed CADDY_VERSION=$caddy_version (major=$major, minor=$minor)"
          echo "caddy_version=$caddy_version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"

      - name: Determine next revision from existing GHCR tags
        id: revision
        if: env.IS_PUBLISH == 'true'
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          CADDY_VERSION: ${{ steps.version.outputs.caddy_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          repo_path="${OWNER}/${REPO_NAME}"
          repo_path_lower="$(echo "$repo_path" | tr '[:upper:]' '[:lower:]')"

          echo "Requesting registry pull token for ${repo_path_lower}..."
          token="$(curl -fsSL \
            -u "${OWNER}:${GH_TOKEN}" \
            "https://ghcr.io/token?scope=repository:${repo_path_lower}:pull&service=ghcr.io" \
            | jq -r '.token')"

          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "::error::Failed to obtain a GHCR registry token"
            exit 1
          fi

          tags_url="https://ghcr.io/v2/${repo_path_lower}/tags/list"
          echo "Fetching tag list from ${tags_url}..."

          http_code="$(curl -s -o /tmp/tags_response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${token}" \
            "${tags_url}")"

          if [ "$http_code" = "404" ]; then
            echo "No existing package/tags found (HTTP 404) — this is the first build."
            highest=0
          elif [ "$http_code" != "200" ]; then
            echo "::error::Unexpected HTTP ${http_code} from GHCR tags list endpoint"
            cat /tmp/tags_response.json || true
            exit 1
          else
            echo "Existing tags:"
            jq -r '.tags[]?' /tmp/tags_response.json | sort

            # Match tags exactly like "<CADDY_VERSION>-rN" and extract N.
            highest="$(jq -r '.tags[]?' /tmp/tags_response.json \
              | grep -E "^${CADDY_VERSION}-r[0-9]+$" \
              | sed -E "s/^${CADDY_VERSION}-r([0-9]+)$/\1/" \
              | sort -n \
              | tail -n1 || true)"

            if [ -z "$highest" ]; then
              echo "No tags matching ${CADDY_VERSION}-r* found — starting at r1."
              highest=0
            fi
          fi

          next_revision=$((highest + 1))
          full_tag="${CADDY_VERSION}-r${next_revision}"

          echo "Highest existing revision: r${highest}"
          echo "Next revision: r${next_revision}"
          echo "Full tag: ${full_tag}"

          echo "next_revision=${next_revision}" >> "$GITHUB_OUTPUT"
          echo "full_tag=${full_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only needed when we're actually going to push.
      - name: Log in to GHCR
        if: env.IS_PUBLISH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Only needed when we're actually going to push: on a PR there
      # are no tags to compute, since we never publish anything.
      - name: Compute image metadata & tags
        id: meta
        if: env.IS_PUBLISH == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=${{ steps.version.outputs.caddy_version }}
            type=raw,value=${{ steps.revision.outputs.full_tag }}

      # Single build step for both code paths:
      # - pull_request: push: false. Proves the image builds
      #   successfully on both platforms; nothing is published, no
      #   registry credentials are used, no tags are computed.
      # - push / workflow_dispatch: push: true, with the full tag set
      #   from docker/metadata-action.
      - name: Build (and push when publishing)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ env.IS_PUBLISH == 'true' }}
          tags: ${{ env.IS_PUBLISH == 'true' && steps.meta.outputs.tags || '' }}
          labels: ${{ env.IS_PUBLISH == 'true' && steps.meta.outputs.labels || '' }}
          build-args: |
            CADDY_VERSION=${{ steps.version.outputs.caddy_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: env.IS_PUBLISH == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CADDY_VERSION: ${{ steps.version.outputs.caddy_version }}
          MAJOR: ${{ steps.version.outputs.major }}
          MINOR: ${{ steps.version.outputs.minor }}
          FULL_TAG: ${{ steps.revision.outputs.full_tag }}
        run: |
          set -euo pipefail

          release_tag="v${FULL_TAG}"
          revision_number="${FULL_TAG##*-r}"
          title="Caddy ${CADDY_VERSION} (r${revision_number})"

          if gh release view "$release_tag" >/dev/null 2>&1; then
            echo "Release ${release_tag} already exists — skipping creation."
            exit 0
          fi

          notes_file="$(mktemp)"
          {
            echo "Automated build of \`ghcr.io/${{ env.IMAGE_NAME }}:${FULL_TAG}\`."
            echo
            echo "**Caddy version:** ${CADDY_VERSION}"
            echo "**Image digest:** ${{ steps.build.outputs.digest }}"
            echo
            echo "**Published tags:**"
            echo "- \`latest\`"
            echo "- \`${MAJOR}\`"
            echo "- \`${MINOR}\`"
            echo "- \`${CADDY_VERSION}\`"
            echo "- \`${FULL_TAG}\`"
            echo
            echo "**Platforms:** linux/amd64, linux/arm64"
          } > "$notes_file"

          gh release create "$release_tag" \
            --title "$title" \
            --notes-file "$notes_file"


