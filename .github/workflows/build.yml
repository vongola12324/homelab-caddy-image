name: Build & Release Caddy Image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "build.sh"
      - "modules.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('caddy-image-pr-{0}', github.event.pull_request.number) || 'caddy-image-build' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IS_PUBLISH: ${{ github.event_name != 'pull_request' }}

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      caddy_version: ${{ steps.version.outputs.caddy_version }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
      full_tag: ${{ steps.revision.outputs.full_tag }}
      modules: ${{ steps.modules.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Parse ARG CADDY_VERSION from Dockerfile
        id: version
        shell: bash
        run: |
          set -euo pipefail

          line="$(grep -m1 '^ARG CADDY_VERSION=' Dockerfile || true)"
          if [ -z "$line" ]; then
            echo "::error::Could not find a line matching '^ARG CADDY_VERSION=' in Dockerfile"
            exit 1
          fi

          caddy_version="${line#ARG CADDY_VERSION=}"
          caddy_version="$(echo "$caddy_version" | tr -d '[:space:]')"

          if ! [[ "$caddy_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Parsed CADDY_VERSION '$caddy_version' is not a plain semver (X.Y.Z)"
            exit 1
          fi

          major="$(echo "$caddy_version" | cut -d. -f1)"
          minor="$(echo "$caddy_version" | cut -d. -f1,2)"

          echo "Parsed CADDY_VERSION=$caddy_version (major=$major, minor=$minor)"
          echo "caddy_version=$caddy_version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"

      - name: Read modules list
        id: modules
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          modules_md=""
          while IFS= read -r line; do
            repo="$(echo "${line%@*}" | sed -E 's#^github\.com/([^/]+)/([^/]+).*#\1/\2#')"

            if [[ "$line" == *@* ]]; then
              ver="${line##*@}"
            else
              # No pinned tag (module has no releases): xcaddy resolves
              # this to the latest commit on the default branch, so show
              # that instead of a version.
              branch="$(gh api "repos/${repo}" --jq '.default_branch' 2>/dev/null || true)"
              sha="$(gh api "repos/${repo}/commits/${branch:-HEAD}" --jq '.sha[0:7]' 2>/dev/null || true)"
              if [ -n "$branch" ] && [ -n "$sha" ]; then
                ver="${branch}@${sha} (latest commit, untagged)"
              else
                ver="latest (untagged)"
              fi
            fi

            modules_md="${modules_md}- [\`${repo}\`](https://github.com/${repo}): \`${ver}\`\n"
          done < <(grep -vE '^\s*#' modules.txt | grep -vE '^\s*$')
          {
            echo "modules<<MODULES_EOF"
            printf '%b' "$modules_md"
            echo "MODULES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Determine next revision from existing GHCR tags
        id: revision
        if: env.IS_PUBLISH == 'true'
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          CADDY_VERSION: ${{ steps.version.outputs.caddy_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          repo_path="${OWNER}/${REPO_NAME}"
          repo_path_lower="$(echo "$repo_path" | tr '[:upper:]' '[:lower:]')"

          echo "Requesting registry pull token for ${repo_path_lower}..."
          token="$(curl -fsSL \
            -u "${OWNER}:${GH_TOKEN}" \
            "https://ghcr.io/token?scope=repository:${repo_path_lower}:pull&service=ghcr.io" \
            | jq -r '.token')"

          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "::error::Failed to obtain a GHCR registry token"
            exit 1
          fi

          tags_url="https://ghcr.io/v2/${repo_path_lower}/tags/list"
          echo "Fetching tag list from ${tags_url}..."

          http_code="$(curl -s -o /tmp/tags_response.json -w '%{http_code}' \
            -H "Authorization: Bearer ${token}" \
            "${tags_url}")"

          if [ "$http_code" = "404" ]; then
            echo "No existing package/tags found (HTTP 404) — this is the first build."
            highest=0
          elif [ "$http_code" != "200" ]; then
            echo "::error::Unexpected HTTP ${http_code} from GHCR tags list endpoint"
            cat /tmp/tags_response.json || true
            exit 1
          else
            echo "Existing tags:"
            jq -r '.tags[]?' /tmp/tags_response.json | sort

            highest="$(jq -r '.tags[]?' /tmp/tags_response.json \
              | grep -E "^${CADDY_VERSION}-r[0-9]+$" \
              | sed -E "s/^${CADDY_VERSION}-r([0-9]+)$/\1/" \
              | sort -n \
              | tail -n1 || true)"

            if [ -z "$highest" ]; then
              echo "No tags matching ${CADDY_VERSION}-r* found — starting at r1."
              highest=0
            fi
          fi

          next_revision=$((highest + 1))
          full_tag="${CADDY_VERSION}-r${next_revision}"

          echo "Highest existing revision: r${highest}"
          echo "Next revision: r${next_revision}"
          echo "Full tag: ${full_tag}"

          echo "next_revision=${next_revision}" >> "$GITHUB_OUTPUT"
          echo "full_tag=${full_tag}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.suffix }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: env.IS_PUBLISH == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push when publishing)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ env.IS_PUBLISH == 'true' }}
          tags: ${{ env.IS_PUBLISH == 'true' && format('{0}/{1}:{2}-{3}', env.REGISTRY, env.IMAGE_NAME, needs.prepare.outputs.full_tag, matrix.suffix) || '' }}
          provenance: false
          build-args: |
            CADDY_VERSION=${{ needs.prepare.outputs.caddy_version }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

  merge:
    name: Merge & Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create multi-arch manifest
        env:
          FULL_TAG: ${{ needs.prepare.outputs.full_tag }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          image_lower="$(echo "${IMAGE}" | tr '[:upper:]' '[:lower:]')"
          docker buildx imagetools create \
            --tag "${image_lower}:latest" \
            --tag "${image_lower}:${{ needs.prepare.outputs.major }}" \
            --tag "${image_lower}:${{ needs.prepare.outputs.minor }}" \
            --tag "${image_lower}:${{ needs.prepare.outputs.caddy_version }}" \
            --tag "${image_lower}:${FULL_TAG}" \
            "${image_lower}:${FULL_TAG}-amd64" \
            "${image_lower}:${FULL_TAG}-arm64"

      - name: Inspect manifest
        env:
          FULL_TAG: ${{ needs.prepare.outputs.full_tag }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          image_lower="$(echo "${IMAGE}" | tr '[:upper:]' '[:lower:]')"
          docker buildx imagetools inspect "${image_lower}:${FULL_TAG}"

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CADDY_VERSION: ${{ needs.prepare.outputs.caddy_version }}
          MAJOR: ${{ needs.prepare.outputs.major }}
          MINOR: ${{ needs.prepare.outputs.minor }}
          FULL_TAG: ${{ needs.prepare.outputs.full_tag }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          MODULES: ${{ needs.prepare.outputs.modules }}
        run: |
          set -euo pipefail

          image_lower="$(echo "${IMAGE}" | tr '[:upper:]' '[:lower:]')"
          release_tag="v${FULL_TAG}"
          revision_number="${FULL_TAG##*-r}"
          title="Caddy ${CADDY_VERSION} (r${revision_number})"

          if gh release view "$release_tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${release_tag} already exists — skipping creation."
            exit 0
          fi

          digest="$(docker buildx imagetools inspect --format '{{.Manifest.Digest}}' "${image_lower}:${FULL_TAG}")"

          notes_file="$(mktemp)"
          {
            echo "Automated build of \`${image_lower}:${FULL_TAG}\`."
            echo
            echo "## Versions"
            echo
            echo "**Caddy:** \`${CADDY_VERSION}\`"
            echo
            echo "**Modules:**"
            echo "${MODULES}"
            echo
            echo "## Image"
            echo
            echo "**Digest:** \`${digest}\`"
            echo
            echo "**Platforms:** \`linux/amd64\`, \`linux/arm64\`"
            echo
            echo "**Tags:**"
            echo "- \`latest\`"
            echo "- \`${MAJOR}\`"
            echo "- \`${MINOR}\`"
            echo "- \`${CADDY_VERSION}\`"
            echo "- \`${FULL_TAG}\`"
          } > "$notes_file"

          gh release create "$release_tag" \
            --repo "${{ github.repository }}" \
            --title "$title" \
            --notes-file "$notes_file"
