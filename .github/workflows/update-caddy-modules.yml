name: Update Caddy Modules
 
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}
 
permissions:
  contents: write
  pull-requests: write
 
jobs:
  check-and-update:
    name: Check module versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
 
      # Each line is "github.com/<owner>/<repo>[/subpath]@vX.Y.Z".
      # The repo is always the first two path segments after
      # github.com/ — this also correctly strips Go major-version
      # suffixes (/v2, /v3) and monorepo subpaths (/plugins/caddy),
      # neither of which are part of the actual GitHub repo.
      #
      # modules.txt has no go.mod, so Dependabot's gomod ecosystem
      # can't see it; there's no ecosystem for a plain custom-format
      # text file like this either, so versions are checked directly
      # against each repo's tags via `gh api` (the GitHub REST API,
      # not the registry protocol GHCR uses for the Caddy version
      # check, so GITHUB_TOKEN works fine here).
      - name: Check for module updates
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
 
          updates_found=false
          summary_file="$(mktemp)"
 
          while IFS= read -r line; do
            module_path="${line%@*}"
            current_version="${line##*@}"
            repo="$(echo "$module_path" | sed -E 's#^github\.com/([^/]+)/([^/]+).*#\1/\2#')"
 
            latest_version="$(gh api "repos/${repo}/tags" --jq '.[].name' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n1 || true)"
 
            if [ -z "$latest_version" ]; then
              echo "::warning::No tags found for ${repo}, skipping"
              continue
            fi
 
            echo "${repo}: current=${current_version} latest=${latest_version}"
 
            if [ "$current_version" != "$latest_version" ]; then
              updates_found=true

              # Not every tag has a GitHub Release with notes; fall back to
              # a compare link when one doesn't exist.
              release_json="$(gh api "repos/${repo}/releases/tags/${latest_version}" 2>/dev/null || true)"
              release_notes="$(echo "$release_json" | jq -r '.body // empty' 2>/dev/null || true)"
              release_url="$(echo "$release_json" | jq -r '.html_url // empty' 2>/dev/null || true)"

              max_len=1500
              if [ "${#release_notes}" -gt "$max_len" ]; then
                release_notes="${release_notes:0:$max_len}"$'\n\n_(truncated — see full release notes)_'
              fi

              {
                echo "### \`${module_path}\`"
                echo "\`${current_version}\` → \`${latest_version}\`"
                echo ""
                if [ -n "$release_notes" ]; then
                  echo "<details>"
                  echo "<summary>Changelog</summary>"
                  echo ""
                  echo "$release_notes"
                  echo ""
                  echo "[Full release notes](${release_url})"
                  echo "</details>"
                else
                  echo "No GitHub release notes found for \`${latest_version}\`. [Compare changes](https://github.com/${repo}/compare/${current_version}...${latest_version})."
                fi
                echo ""
              } >> "$summary_file"

              sed -i "s|${module_path}@${current_version}|${module_path}@${latest_version}|" modules.txt
            fi
          done < <(grep -vE '^\s*#' modules.txt | grep -vE '^\s*$')
 
          echo "updates_found=${updates_found}" >> "$GITHUB_OUTPUT"

          # Random delimiter: changelogs are upstream-controlled text, so a
          # fixed delimiter could be used to inject extra GITHUB_OUTPUT keys.
          delimiter="MODULE_SUMMARY_$(openssl rand -hex 8)"
          {
            echo "summary<<${delimiter}"
            cat "$summary_file"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"
 
      - name: Open pull request
        id: cpr
        if: steps.check.outputs.updates_found == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump Caddy modules in modules.txt"
          title: "chore: bump Caddy modules"
          body: |
            Automated update detected newer versions for one or more modules in `modules.txt`.
 
            ${{ steps.check.outputs.summary }}
          branch: bump-caddy-modules
          delete-branch: true
          labels: |
            dependencies
            automated
 
      # Only flags auto-merge; actual merge waits on build.yml's
      # required status checks (set up via branch protection).
      - name: Enable Pull Request Automerge
        if: steps.check.outputs.updates_found == 'true'
        shell: bash
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
